<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2>회원 관리 (관리자 전용)</h2>
    </div>

    <div class="search-bar" style="margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
        <select id="admin-role-target" style="width: 150px;">
            <option value="pending">대기자</option>
            <option value="staff">스태프</option>
            <option value="admin">어드민</option>
        </select>
        <button onclick="pages.handleSelectedRoleUpdate()">권한 변경</button>
    </div>

    <div class="search-bar" style="margin-bottom: 1.5rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap;">
        <input type="text" id="admin-search-query" placeholder="이름 또는 이메일 검색" style="flex: 1; min-width: 200px;" onkeypress="if(event.key === 'Enter') pages.handleAdminSearch()">
        <select id="admin-filter-dept" style="width: 150px;" onchange="pages.handleAdminSearch()">
            <option value="">부서 전체</option>
            <option value="developer">개발자</option>
            <option value="medical team">의료진</option>
            <option value="researcher">연구진</option>
        </select>
        <button onclick="pages.handleAdminSearch()">검색</button>
        <button class="secondary" onclick="pages.resetAdminSearch()">초기화</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>선택</th>
                <th>ID</th>
                <th>이름</th>
                <th>이메일</th>
                <th>부서</th>
                <th>전화번호</th>
                <th>권한</th>
                <th>상태</th>
            </tr>
        </thead>
        <tbody id="admin-users-list">
            <!-- JS로 채워짐 -->
        </tbody>
    </table>
</div>
